services:
  postgres:
    image: postgres:16
    container_name: collective-science-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: collective_science
      POSTGRES_USER: collective_science
      POSTGRES_PASSWORD: collective_science
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collective_science -d collective_science"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: collective-science-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://collective_science:collective_science@postgres:5432/collective_science
      JWT_SECRET: change-me-in-production
      CORS_ORIGINS: http://localhost:3000
      SEED_ON_STARTUP: "true"
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/app/entrypoint.sh"]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openapi.json')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build: ./frontend
    container_name: collective-science-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      CS_API_TOKEN: ""
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
