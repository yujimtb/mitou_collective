services:
  postgres:
    image: postgres:16
    container_name: tsumu-graph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tsumu_graph
      POSTGRES_USER: tsumu_graph
      POSTGRES_PASSWORD: tsumu_graph
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsumu_graph -d tsumu_graph"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: tsumu-graph-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://tsumu_graph:tsumu_graph@postgres:5432/tsumu_graph
      JWT_SECRET: change-me-in-production
      CORS_ORIGINS: http://localhost:3000
      SEED_ON_STARTUP: "true"
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/app/entrypoint.sh"]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openapi.json')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build: ./frontend
    container_name: tsumu-graph-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      CS_API_TOKEN: ""
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
